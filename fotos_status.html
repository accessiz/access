        .controls {

            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            margin-bottom: 2rem;

            flex: 1;
            min-width: 300px;
            position: relative;
        }

        input, select {

            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus, select:focus {

            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .filters {
            display: flex;
            gap: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-light);
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .table-container {
            background: var(--surface);
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem 1.5rem;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .name-cell {
            font-weight: 600;
            color: #fff;
        }

        .gender-tag {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .check-icon {
            color: var(--success);
            font-weight: bold;
        }

        .cross-icon {
            color: var(--error);
            font-weight: bold;
            opacity: 0.5;
        }

        .badge {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-weight: 600;
        }

        const tableBody = document.getElementById('table-body');
        const searchInput = document.getElementById('search-input');
        const genderFilter = document.getElementById('gender-filter');
        const statusFilter = document.getElementById('status-filter');

        function renderTable(data) {
            tableBody.innerHTML = '';
            
            data.forEach(model => {
                const hasCover = !!model.cover_path;
                const compCardCount = (model.comp_card_paths || []).filter(p => p !== null).length;
                const galleryCount = (model.gallery_paths || []).filter(p => p !== null).length;
                const hasPortfolio = galleryCount > 0;
                
                const isComplete = hasCover && galleryCount >= 1 && compCardCount >= 1;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="name-cell">${model.full_name || 'Sin Nombre'}</td>
                    <td><span class="gender-tag">${model.gender || 'N/A'}</span></td>
                    <td>${hasCover ? '<span class="check-icon">✓</span>' : '<span class="cross-icon">✗</span>'}</td>
                    <td>${compCardCount} fotos</td>
                    <td>${hasPortfolio ? '<span class="check-icon">✓</span>' : '<span class="cross-icon">✗</span>'}</td>
                    <td>
                        <span class="badge ${isComplete ? 'badge-success' : 'badge-error'}">
                            ${isComplete ? 'Completo' : 'Incompleto'}
                        </span>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            // Update stats
            document.getElementById('total-count').textContent = data.length;
            document.getElementById('complete-count').textContent = data.filter(m => {
                const compCardCount = (m.comp_card_paths || []).filter(p => p !== null).length;
                const galleryCount = (m.gallery_paths || []).filter(p => p !== null).length;
                return m.cover_path && galleryCount >= 1 && compCardCount >= 1;
            }).length;
            document.getElementById('incomplete-count').textContent = data.length - parseInt(document.getElementById('complete-count').textContent);
        }

        function filterData() {
            const searchTerm = searchInput.value.toLowerCase();
            const genderValue = genderFilter.value;
            const statusValue = statusFilter.value;

            const filtered = modelsData.filter(model => {
                const matchesSearch = model.full_name.toLowerCase().includes(searchTerm);
                const matchesGender = genderValue === 'all' || model.gender === genderValue;
                
                const hasCover = !!model.cover_path;
                const compCardCount = (model.comp_card_paths || []).filter(p => p !== null).length;
                const galleryCount = (model.gallery_paths || []).filter(p => p !== null).length;
                const isComplete = hasCover && galleryCount >= 1 && compCardCount >= 1;
                
                const matchesStatus = statusValue === 'all' || 
                                     (statusValue === 'complete' && isComplete) || 
                                     (statusValue === 'incomplete' && !isComplete);

                return matchesSearch && matchesGender && matchesStatus;
            });

            renderTable(filtered);
        }

        searchInput.addEventListener('input', filterData);
        genderFilter.addEventListener('change', filterData);
        statusFilter.addEventListener('change', filterData);

        // Initial render
        renderTable(modelsData);
    </script>
